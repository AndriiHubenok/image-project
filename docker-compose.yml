services:
  # =========================
  # IMAGE STORAGE SERVICE
  # =========================
  image-service:
    build:
      context: ./image-storage-service
      dockerfile: Dockerfile
    container_name: image-service
    ports:
      - "127.0.0.1:8089:8088"
    env_file:
      - ./image-storage-service/.env
    depends_on:
      image-storage:
        condition: service_healthy
      message-broker:
        condition: service_healthy
    networks:
      - microservice-network

  # =====================
  # SPRING AI TEXT MODERATION
  # =====================
  moderation-service:
    build:
      context: ./text-moderation-service
      dockerfile: Dockerfile
    container_name: moderation-service
    ports:
      - "127.0.0.1:8093:8092"
    env_file:
      - ./text-moderation-service/.env
    depends_on:
      message-broker:
        condition: service_healthy
    networks:
      - microservice-network

  # =========================
  # MINIO
  # =========================
  image-storage:
    image: minio/minio
    container_name: image-storage
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9002:9000"
      - "127.0.0.1:9003:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - image_data:/data
    networks:
      - microservice-network

  # =========================
  # RabbitMQ
  # =========================
  message-broker:
    image: rabbitmq:3-management
    container_name: message-broker
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-rabbitadmin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-rabbitadmin123}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - rabbitmq_image_data:/var/lib/rabbitmq
    networks:
      - microservice-network

  # =========================
  # IMAGE AUDIT SERVICE
  # =========================
  image-audit-service:
    build:
      context: ./image-audit-service
      dockerfile: Dockerfile
    container_name: image-audit-service
    ports:
      - "127.0.0.1:8091:8090"
    env_file:
      - ./image-audit-service/.env
    depends_on:
      message-broker:
        condition: service_healthy
      audit-db:
        condition: service_healthy
    networks:
      - microservice-network

  # =========================
  # POSTGRESQL DATABASE
  # =========================
  audit-db:
    image: postgres:16-alpine
    container_name: audit-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: audit_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d audit_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - audit_data:/var/lib/postgresql/data
    networks:
      - microservice-network

# =========================
# VOLUMES
# =========================
volumes:
  image_data:
  rabbitmq_image_data:
  audit_data:
  
# =========================
# NETWORK
# =========================
networks:
  microservice-network:
